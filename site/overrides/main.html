{% extends "base.html" %}

{% block announce %}
  <a href="https://github.com/nbaertsch/Mythic-MCP" target="_blank" rel="noopener">
    ⭐ If you find Mythic MCP useful, give it a star on GitHub!
  </a>
{% endblock %}

{% block content %}
  {{ super() }}

  <!-- GitHub header badges — injected into .md-header__inner -->
  <script>
    (function() {
      var REPO = "nbaertsch/Mythic-MCP";

      // Build the container
      var wrap = document.createElement("div");
      wrap.className = "gh-header-badges";

      // GitHub icon + link
      var ghLink = document.createElement("a");
      ghLink.href = "https://github.com/" + REPO;
      ghLink.target = "_blank";
      ghLink.rel = "noopener";
      ghLink.className = "gh-header-badge";
      ghLink.title = "View on GitHub";
      ghLink.innerHTML =
        '<svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor">' +
          '<path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38' +
          ' 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28' +
          '-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28' +
          '-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02' +
          '.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53' +
          '-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07' +
          '-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15' +
          '.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>' +
        '</svg>';
      wrap.appendChild(ghLink);

      // Star badge
      var starLink = document.createElement("a");
      starLink.href = "https://github.com/" + REPO + "/stargazers";
      starLink.target = "_blank";
      starLink.rel = "noopener";
      starLink.className = "gh-header-badge gh-stars";
      starLink.title = "Star on GitHub";
      starLink.innerHTML =
        '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor">' +
          '<path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1' +
          ' .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766' +
          ' 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28' +
          'l4.21-.611L7.327.668A.75.75 0 0 1 8 .25z"/>' +
        '</svg>' +
        '<span class="gh-star-count">—</span>';
      wrap.appendChild(starLink);

      // Inject into header
      var header = document.querySelector(".md-header__inner");
      if (header) {
        header.style.position = "relative";
        header.appendChild(wrap);
      }

      // Fetch star count
      fetch("https://api.github.com/repos/" + REPO)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var el = document.querySelector(".gh-star-count");
          if (el && typeof d.stargazers_count === "number") {
            el.textContent = d.stargazers_count;
          }
        })
        .catch(function() {});
    })();
  </script>
{% endblock %}
