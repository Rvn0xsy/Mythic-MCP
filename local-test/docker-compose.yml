name: mythic-mcp-local-test

services:
  mythic-mcp:
    build:
      context: ..
      dockerfile: local-test/Dockerfile
    environment:
      # Mythic connection (required by the MCP server)
      MYTHIC_URL: ${MYTHIC_URL}
      MYTHIC_API_TOKEN: ${MYTHIC_API_TOKEN-}
      MYTHIC_USERNAME: ${MYTHIC_USERNAME-}
      MYTHIC_PASSWORD: ${MYTHIC_PASSWORD-}
      MYTHIC_SSL: ${MYTHIC_SSL-true}
      MYTHIC_SKIP_TLS_VERIFY: ${MYTHIC_SKIP_TLS_VERIFY-true}

      # MCP HTTP transport settings
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: ${MCP_HTTP_PORT-3333}

      # File vending system
      FILE_VENDING_ENABLED: ${FILE_VENDING_ENABLED-true}
      FILE_VENDING_BASE_URL: ${FILE_VENDING_BASE_URL-}
      FILE_STORAGE_PATH: ${FILE_STORAGE_PATH-/tmp/mythic-files}
      FILE_TOKEN_EXPIRY: ${FILE_TOKEN_EXPIRY-5m}
      FILE_MAX_SIZE_MB: ${FILE_MAX_SIZE_MB-100}
      FILE_CLEANUP_INTERVAL: ${FILE_CLEANUP_INTERVAL-60s}

      # Logging / timeouts
      LOG_LEVEL: ${LOG_LEVEL-info}
      TIMEOUT: ${TIMEOUT-30s}
    networks:
      - mythic_default
    ports:
      - "${MCP_HTTP_PORT-3333}:3333"

networks:
  mythic_default:
    external: true
